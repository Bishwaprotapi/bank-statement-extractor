swagger: '2.0'
info:
  version: '1.0'
  title: 'AKIJ iBOS API Template'
  description: 'API description'
paths:

# region tanvir
  /api/process_bank_statement:
    post:
      tags:
        - "bank_statement"
      summary: "Process bank statement file"
      description: "Endpoint to process an image or PDF and extract specific fields using OCR"
      operationId: "processBankStatement"
      consumes:
        - "multipart/form-data"
      produces:
        - "application/json"
      parameters:
        - name: file
          in: formData
          type: file
          required: true
          description: "The image file or PDF to be processed (PDF, PNG, JPG, JPEG)"
      responses:
        200:
          description: "Successfully extracted fields from the image/PDF"
          schema:
            type: object
            properties:
              BankAccountNo:
                type: string
                example: "1234567890"
              BankName:
                type: string
                example: "Jamuna Bank Limited"
              Transactions:
                type: array
                items:
                  type: object
                  properties:
                    TransactionDate:
                      type: string
                      example: "2024-01-15"
                    Particulars:
                      type: string
                      example: "Transfer to account"
                    InstrumentNo:
                      type: string
                      example: "CHQ123456"
                    MonDebit:
                      type: number
                      example: 1000.50
                    MonCredit:
                      type: number
                      example: 0
                    MonBalance:
                      type: number
                      example: 5000.25
        400:
          description: "Error in processing the image/PDF or extracting fields"
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Error message describing the issue"

